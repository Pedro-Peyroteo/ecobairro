name: ecobairro

x-js-workspace-volumes: &js-workspace-volumes
  - ../../:/workspace
  - pnpm-store:/pnpm/store
  - root-node-modules:/workspace/node_modules
  - web-node-modules:/workspace/apps/web/node_modules
  - api-node-modules:/workspace/apps/api/node_modules
  - contracts-node-modules:/workspace/packages/contracts/node_modules
  - config-node-modules:/workspace/packages/config/node_modules
  - tsconfig-node-modules:/workspace/packages/tsconfig/node_modules
  - eslint-config-node-modules:/workspace/packages/eslint-config/node_modules

services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    working_dir: /workspace
    command:
      - /bin/sh
      - /workspace/infra/scripts/start-js-service.sh
      - '@ecobairro/web'
      - dev
      - --host
      - 0.0.0.0
      - --port
      - '5173'
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      VITE_API_BASE_URL: /api
      VITE_ANALYTICS_BASE_URL: /analytics
    volumes: *js-workspace-volumes
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:5173').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    working_dir: /workspace
    command:
      - /bin/sh
      - /workspace/infra/scripts/start-js-service.sh
      - '@ecobairro/api'
      - dev
    environment:
      NODE_ENV: development
      PORT: '3000'
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecobairro}:${POSTGRES_PASSWORD:-ecobairro}@postgres:5432/${POSTGRES_DB:-ecobairro}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *js-workspace-volumes
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/ready').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  analytics:
    build:
      context: ../..
      dockerfile: apps/analytics/Dockerfile
    working_dir: /app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - '8000'
      - --reload
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecobairro}:${POSTGRES_PASSWORD:-ecobairro}@postgres:5432/${POSTGRES_DB:-ecobairro}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../apps/analytics:/app
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:8000/ready').status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecobairro}
      POSTGRES_USER: ${POSTGRES_USER:-ecobairro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecobairro}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      analytics:
        condition: service_healthy
    ports:
      - ${NGINX_PORT:-8080}:80
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres-data:
  pnpm-store:
  root-node-modules:
  web-node-modules:
  api-node-modules:
  contracts-node-modules:
  config-node-modules:
  tsconfig-node-modules:
  eslint-config-node-modules:
